<style>

  /* イントロ画面 */
  #intro {

  #intro .hint-label { font-size: 14px; opacity: 0.8; }
  #intro .hint-arrow { font-size: 12px; opacity: 0.6; }
  #start-btn {

  #start-btn:active { transform: scale(0.95); }

  /* メイン画面 */
  #app {
    position: relative;
    height: 100dvh;

    flex-direction: column;
  }

  /* プログレスバー */
  #progress {

  .progress-dot {
    flex: 1;

  }
  .progress-dot.done { background: #ff6b6b; }
  .progress-dot.current { background: rgba(255,255,255,0.5); }

  /* カードエリア */
  #card-area {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px 20px 30px;
  }

  .card {
    position: absolute;
    width: calc(100vw - 40px);
    max-width: 400px;
    aspect-ratio: 3/4;
    max-height: calc(100dvh - 100px);
    border-radius: 16px;
    overflow: hidden;
    background: #2a2a3e;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    will-change: transform, box-shadow;
    transition: box-shadow 0.2s;
  }
  .card.grabbing {
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    cursor: grabbing;
  }
  .card.animate {
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                opacity 0.4s ease-out,
                box-shadow 0.3s;
  }
  .card.fly-out {
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  /* ×○ オーバーレイ */
  .card .overlay-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 120px;
    font-weight: 900;
    opacity: 0;
    pointer-events: none;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: none;
  }
  .card .overlay-ng {
    color: #ff4757;
  }
  .card .overlay-ok {
    color: #2ed573;
  }

  /* スワイプ確定時の絵文字エフェクト */
  .swipe-emoji {
    position: fixed;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.3);
    font-size: 100px;
    opacity: 0;
    pointer-events: none;
    z-index: 150;
    animation: emojiPop 0.8s ease-out forwards;
  }
  @keyframes emojiPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(1.1); }
  }

  /* 初回スワイプヒント */
  #swipe-guide {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    opacity: 0;
    animation: guideIn 0.5s 0.6s ease-out forwards;
  }
  #swipe-guide.fade-out {
    animation: guideOut 0.4s ease-out forwards;
  }
  @keyframes guideIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes guideOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  .guide-side {
    display: flex;
    flex-direction: column;
    align-items: center;

  .guide-arrow {

  .guide-side:first-child .guide-arrow { animation: arrowBounceLeft 1s ease-in-out infinite; }
  .guide-side:last-child .guide-arrow { animation: arrowBounceRight 1s ease-in-out infinite; }
  @keyframes arrowBounceLeft {
    0%, 100% { transform: translateX(0); }

  }
  @keyframes arrowBounceRight {
    0%, 100% { transform: translateX(0); }

  /* 投稿ボタン */
  .submit-section {

  }
  .submit-section .divider {

    color: rgba(255,255,255,0.3);

  }
  .submit-btn {
    display: inline-flex;

  /* カード上の投稿者情報 */
  .card-info {
    position: absolute;

    padding: 40px 16px 14px;

  }
  .card-info .poster-name {

  /* カウンター */

    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);

</style>

<body>

</div>

<!-- イントロ -->
<div id="intro">
  <h1>あなたの84kenに<br>出会えるかも</h1>
  <p>〜理想の84kenに出会えるマッチングアプリ〜</p>
  <div class="swipe-hint">
    <div class="hint-item">
      <div class="hint-icon ng">✕</div>
      <div class="hint-label">NG</div>
      <div class="hint-arrow">← 左スワイプ</div>
    </div>

  <div id="progress"></div>

  </div>
</div>

<!-- 初回スワイプガイド -->
<div id="swipe-guide" style="display:none;">
  <div class="guide-side">
    <div class="guide-arrow">←</div>
    <div class="guide-icon ng">✕</div>
    <div class="guide-label">NG</div>

<div id="result">
  <h2>理想の84kenに<br>出会えましたか？</h2>
  <div class="favorites" id="favorites"></div>
  <div class="result-buttons">
    <button class="result-btn" id="btn-yes">はい、出会えました</button>
    <button class="result-btn" id="btn-no">いいえ、まだ探しに行きます</button>
  </div>
  <div class="submit-section">
    <div class="divider">- - -</div>
    <a href="GOOGLE_FORM_URL" target="_blank" rel="noopener" class="submit-btn" id="submit-photo-btn">
      <span class="camera-icon">📸</span>
      あなたの84kenを投稿する
    </a>
  </div>

<script>
// PC判定
function isMobile() {
  return /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints > 0 && window.innerWidth < 900);
}

if (!isMobile()) {
  document.getElementById('pc-warning').style.display = 'flex';
  document.getElementById('intro').style.display = 'none';
  document.getElementById('app').style.display = 'none';
}

// 画像グループ（同じロケーション/シチュエーション）
// ユーザー投稿写真は group: 'U' で name, comment 付き
const imageGroups = [
  { group: 'A', files: ['DSC03636.jpg', 'DSC04081.jpg', 'DSC04111.jpg', 'D9KDF3eU8AE_m4Y.jpeg', 'DSC09313.jpg'] },
  { group: 'B', files: ['DSC05600.jpg', 'DSC05613.jpg'] },
  { group: 'C', files: ['DSC05674.jpg', 'DSC05680.jpg'] },
  { group: 'D', files: ['DSC09440.jpg', 'DSC09450.jpg'] },
  { group: 'E', files: ['DSC09861.jpg', 'DSC09914.jpg'] },
  { group: 'F', files: ['DSC00066.jpg', 'DSC00117.jpg', 'DSC00155.jpg'] },
  { group: 'G', files: ['DSC00424.jpg'] },
  { group: 'H', files: ['DSC01754.jpg'] },
  { group: 'I', files: ['DSC01865.jpg', 'DSC01883.jpg'] },
  { group: 'J', files: ['DSC02598.jpg', 'DSC04533.jpg'] },
  { group: 'K', files: ['DSC03293.jpg'] },
  { group: 'L', files: ['DSC04719.jpg'] },
  { group: 'M', files: ['DSC05867.jpg', 'DSC05914.jpg'] },
  { group: 'N', files: ['A7408284.jpg', 'A7408299.jpg', 'A7408393.jpg'] },
  { group: 'O', files: ['84ken-saisai-17.jpg', '84ken-saisai-34.jpg', '84ken-saisai-43.jpg', '84ken-saisai-50.jpg', '84ken-saisai-62.jpg'] },
  // --- ユーザー投稿写真（承認済み）はここに追加 ---
  // 例: { group: 'U', files: ['user/user_001.jpg'], name: 'タロウ', comment: '川で最高の一枚' },
];

// ファイル→グループのマップ & ファイル→メタ情報のマップ
const fileToGroup = {};
const fileMeta = {};
imageGroups.forEach(g => g.files.forEach(f => {
  fileToGroup[f] = g.group;
  if (g.name) fileMeta[f] = { name: g.name, comment: g.comment || '' };
}));

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 同グループが連続しない10枚を選ぶ
function selectDiverseImages(count) {
  // 各グループから1枚ずつランダムに選ぶ（まずグループの多様性を確保）
  const shuffledGroups = shuffle(imageGroups);
  let pool = shuffledGroups.map(g => {
    const shuffled = shuffle(g.files);
    return shuffled[0];
  });
  // 15グループあるので余裕がある。10枚選ぶ
  pool = shuffle(pool).slice(0, count);

  // 同グループが連続しないように並べ替え
  const result = [pool.shift()];
  while (pool.length > 0 && result.length < count) {
    const lastGroup = fileToGroup[result[result.length - 1]];
    const diffIdx = pool.findIndex(f => fileToGroup[f] !== lastGroup);
    if (diffIdx >= 0) {
      result.push(pool.splice(diffIdx, 1)[0]);
    } else {
      result.push(pool.shift());
    }
  }
  return result;
}

let images = [];
let currentIndex = 0;
let favorites = [];
let cardEl = null;

const cardArea = document.getElementById('card-area');
const progressEl = document.getElementById('progress');
const counterEl = document.getElementById('counter');
const favoritesEl = document.getElementById('favorites');

function initGame() {
  images = selectDiverseImages(10);
  currentIndex = 0;
  favorites = [];

  // プリロード
  images.forEach(src => {
    const img = new Image();
    img.src = src;
  });

  // プログレスバー
  progressEl.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i === 0 ? ' current' : '');
    progressEl.appendChild(dot);
  }

  updateCounter();
  createCard();
  showSwipeGuide();
}

function updateCounter() {
  counterEl.textContent = `${Math.min(currentIndex + 1, 10)} / 10`;
}

function updateProgress() {
  const dots = progressEl.querySelectorAll('.progress-dot');
  dots.forEach((d, i) => {
    d.className = 'progress-dot';
    if (i < currentIndex) d.classList.add('done');
    else if (i === currentIndex) d.classList.add('current');
  });
}

function createCard() {
  if (currentIndex >= 10) {
    showResult();
    return;
  }

  // 次のカード（裏に見える用）
  const existingNext = cardArea.querySelector('.card-next');
  if (existingNext) existingNext.remove();

  if (currentIndex + 1 < 10) {
    const nextCard = document.createElement('div');
    nextCard.className = 'card card-next';
    nextCard.style.transform = 'scale(0.95)';
    nextCard.style.opacity = '0.5';
    nextCard.innerHTML = `<img src="${images[currentIndex + 1]}" alt="84ken">`;
    cardArea.insertBefore(nextCard, cardArea.firstChild);
  }

  // メインカード
  cardEl = document.createElement('div');
  cardEl.className = 'card';
  const currentFile = images[currentIndex];
  const meta = fileMeta[currentFile];
  const infoHTML = meta ? `
    <div class="card-info">
      <div class="user-badge">みんなの投稿</div>
      <div class="poster-name">${meta.name}</div>
      ${meta.comment ? `<div class="poster-comment">${meta.comment}</div>` : ''}
    </div>` : '';
  cardEl.innerHTML = `
    <img src="${currentFile}" alt="84ken">
    ${infoHTML}
    <div class="overlay-icon overlay-ng">✕</div>
    <div class="overlay-icon overlay-ok">○</div>
  `;
  cardArea.appendChild(cardEl);

  setupSwipe(cardEl);
}

function setupSwipe(card) {
  let startX = 0, startY = 0, currentX = 0, currentY = 0;
  let isDragging = false, touchYRatio = 0.5;
  let velocityX = 0, lastX = 0, lastTime = 0;
  const threshold = 70;

  card.addEventListener('touchstart', (e) => {
    isDragging = true;
    const touch = e.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    currentX = 0;
    currentY = 0;
    velocityX = 0;
    lastX = startX;
    lastTime = Date.now();

    // タッチ位置のY比率（上=0, 下=1）→回転の支点に使う
    const rect = card.getBoundingClientRect();
    touchYRatio = (touch.clientY - rect.top) / rect.height;

    // 掴んだ感 - 少し持ち上げる
    card.style.transition = 'transform 0.15s ease-out, box-shadow 0.15s';
    card.classList.add('grabbing');
    card.style.transform = 'scale(1.02)';
    requestAnimationFrame(() => {
      card.style.transition = 'none';
    });
  }, { passive: true });

  card.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const touch = e.touches[0];
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    currentX = dx;
    currentY = dy;

    // 速度計算（フリック検知用）
    const now = Date.now();
    const dt = now - lastTime;
    if (dt > 0) {
      velocityX = (touch.clientX - lastX) / dt;
      lastX = touch.clientX;
      lastTime = now;
    }

    // タッチ位置で回転量が変わる（上を掴むと大きく回転、下を掴むと小さく回転）
    const rotateMultiplier = 0.06 + (1 - touchYRatio) * 0.08;
    const rotate = dx * rotateMultiplier;

    // Y方向も少し追従（指についてくる感）
    const moveY = dy * 0.3;

    card.style.transform = `translateX(${dx}px) translateY(${moveY}px) rotate(${rotate}deg) scale(1.02)`;

    // 背景カードも連動
    const nextCard = cardArea.querySelector('.card-next');
    if (nextCard) {
      const p = Math.min(Math.abs(dx) / 200, 1);
      nextCard.style.transform = `scale(${0.95 + p * 0.05})`;
      nextCard.style.opacity = `${0.5 + p * 0.5}`;
    }

    // オーバーレイ表示
    const ngIcon = card.querySelector('.overlay-ng');
    const okIcon = card.querySelector('.overlay-ok');
    const progress = Math.min(Math.abs(dx) / threshold, 1);

    if (dx < 0) {
      ngIcon.style.opacity = progress * 0.9;
      ngIcon.style.transform = `translate(-50%, -50%) scale(${0.5 + progress * 0.5})`;
      okIcon.style.opacity = 0;
    } else if (dx > 0) {
      okIcon.style.opacity = progress * 0.9;
      okIcon.style.transform = `translate(-50%, -50%) scale(${0.5 + progress * 0.5})`;
      ngIcon.style.opacity = 0;
    } else {
      ngIcon.style.opacity = 0;
      okIcon.style.opacity = 0;
    }
  }, { passive: true });

  card.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    card.classList.remove('grabbing');

    // フリック判定（速度が速ければ閾値が低くてもOK）
    const flicked = Math.abs(velocityX) > 0.5;
    const shouldSwipe = Math.abs(currentX) > threshold || (flicked && Math.abs(currentX) > 30);

    if (shouldSwipe) {
      const direction = currentX > 0 ? 'right' : 'left';
      flyOut(card, direction, velocityX);
    } else {
      // スプリングで戻す
      card.classList.add('animate');
      card.style.transform = 'translateX(0) translateY(0) rotate(0deg) scale(1)';
      card.querySelector('.overlay-ng').style.opacity = 0;
      card.querySelector('.overlay-ok').style.opacity = 0;

      // 背景カードも戻す
      const nextCard = cardArea.querySelector('.card-next');
      if (nextCard) {
        nextCard.style.transition = 'transform 0.4s, opacity 0.4s';
        nextCard.style.transform = 'scale(0.95)';
        nextCard.style.opacity = '0.5';
        setTimeout(() => { nextCard.style.transition = ''; }, 400);
      }

      setTimeout(() => card.classList.remove('animate'), 500);
    }
  });
}

function showSwipeEmoji(direction) {
  const emoji = document.createElement('div');
  emoji.className = 'swipe-emoji';
  emoji.textContent = direction === 'right' ? '\u{1FAF6}' : '\u{1F44E}';
  document.body.appendChild(emoji);
  setTimeout(() => emoji.remove(), 850);
}

function flyOut(card, direction, velocity) {
  hideSwipeGuide();
  const speed = Math.max(Math.abs(velocity || 0), 0.8);
  const flyX = direction === 'right' ? window.innerWidth * 1.5 : -window.innerWidth * 1.5;
  const rotate = direction === 'right' ? 20 + speed * 10 : -(20 + speed * 10);

  showSwipeEmoji(direction);

  card.classList.add('fly-out');
  card.style.transform = `translateX(${flyX}px) rotate(${rotate}deg)`;
  card.style.opacity = '0';

  if (direction === 'right') {
    favorites.push(images[currentIndex]);
  }

  setTimeout(() => {
    card.remove();
    currentIndex++;
    updateProgress();
    updateCounter();
    createCard();
  }, 350);
}

// 初回スワイプガイド表示
let guideShown = false;
function showSwipeGuide() {
  if (guideShown) return;
  guideShown = true;
  const guide = document.getElementById('swipe-guide');
  guide.style.display = 'flex';
  // 最初のスワイプ or 3秒後に消す
  setTimeout(() => {
    if (guide.style.display !== 'none') {
      guide.classList.add('fade-out');
      setTimeout(() => { guide.style.display = 'none'; }, 400);
    }
  }, 3000);
}
function hideSwipeGuide() {
  const guide = document.getElementById('swipe-guide');
  if (guide.style.display !== 'none' && !guide.classList.contains('fade-out')) {
    guide.classList.add('fade-out');
    setTimeout(() => { guide.style.display = 'none'; }, 400);
  }
}

// 結果画面
function showResult() {
  const result = document.getElementById('result');
  favoritesEl.innerHTML = '';

  if (favorites.length > 0) {
    favorites.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.className = 'fav-img';
      favoritesEl.appendChild(img);
    });
  } else {
    const p = document.createElement('p');
    p.className = 'no-fav';
    p.textContent = 'ピンとくる84kenはいなかったみたい...';
    favoritesEl.appendChild(p);
  }

  result.classList.add('show');
}

// スタート
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('intro').classList.add('hide');
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
  }, 500);
  initGame();
});

// 結果ボタン
function resetGame() {
  const result = document.getElementById('result');
  result.classList.remove('show');
  result.style.display = 'none';
  cardArea.querySelectorAll('.card').forEach(c => c.remove());
  initGame();
}

document.getElementById('btn-yes').addEventListener('click', () => {
  const result = document.getElementById('result');
  result.querySelector('h2').innerHTML = 'すてきな出会いに<br>乾杯！🍻';
  document.querySelector('.result-buttons').innerHTML =
    '<button class="result-btn" id="btn-retry" style="background:linear-gradient(135deg,#ff6b6b,#ee5a24);box-shadow:0 4px 20px rgba(238,90,36,0.3)">もう一回やる</button>';
  document.getElementById('btn-retry').addEventListener('click', () => {
    // 投稿セクションのHTMLを復元
    document.querySelector('.submit-section').innerHTML = '<div class="divider">- - -</div><a href="GOOGLE_FORM_URL" target="_blank" rel="noopener" class="submit-btn"><span class="camera-icon">📸</span>あなたの84kenを投稿する</a>';
    resetGame();
  });
});

document.getElementById('btn-no').addEventListener('click', () => {
  resetGame();
});
</script>
